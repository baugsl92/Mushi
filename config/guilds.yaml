    temperature:
      air_mean_ideal_f: [55, 82]
      soil_ideal_f: [54, 75]
      trend_ideal_f_per_day: [-1.10, 1.10]
      gdd_base_f: 45
      gdd_mode: rolling
      gdd_window_days: 30
      gdd_ideal: [180, 800]
      hard_freeze_f: 27
    weights:
      season: 10
      air_temperature: 20
      soil_temperature: 25
      temperature_trend: 10
      degree_days: 20
      overnight_humidity: 10
      rain_pulse: 5
    model_notes:
      - Shallow-to-mid soil moisture is emphasized.
      - Recharge pulses matter, but dry soil still caps the final score.
